<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashDeck</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f0e8; --bg2: #ede7d9; --surface: #ffffff; --surface2: #faf7f2;
  --border: #e0d8cc; --border2: #cdc4b5;
  --accent: #c0622f; --accent2: #4a7c59; --accent3: #3d5fa0;
  --text: #1e1a14; --muted: #8a8070; --muted2: #b8ad9e; --ink: #2c2416;
  --correct: #4a7c59; --wrong: #b84040; --correct-bg: #edf7f1; --wrong-bg: #fdf0f0;
}
[data-dark] {
  --bg: #181612; --bg2: #201e19; --surface: #252118; --surface2: #2c2820;
  --border: #38332a; --border2: #4a4438;
  --accent: #e07848; --accent2: #5e9e6e; --accent3: #6080c8;
  --text: #e8e0d0; --muted: #8a8070; --muted2: #6a6058; --ink: #f0e8d8;
  --correct: #5e9e6e; --wrong: #e05050; --correct-bg: #1e2e22; --wrong-bg: #2e1a1a;
}
body { font-family: 'Fraunces', Georgia, serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .2s, color .2s; }
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c0a882' fill-opacity='0.07'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}
.app { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 40px 24px; }
header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 52px; flex-wrap: wrap; gap: 12px; }
.header-left { display: flex; align-items: baseline; gap: 12px; }
.header-right { display: flex; gap: 8px; }
.btn-sm { font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.04em; text-transform: uppercase; padding: 7px 13px; border-radius: 7px; border: 1.5px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
.btn-sm:hover { border-color: var(--accent2); color: var(--accent2); background: #f0f7f3; }
.import-success { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--accent2); padding: 7px 13px; opacity: 0; transition: opacity 0.3s; }
.import-success.show { opacity: 1; }
.logo { font-size: 2rem; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; }
.logo em { font-style: italic; color: var(--accent); }
.logo-sub { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted2); letter-spacing: 0.08em; }
.section-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 14px; }
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; margin-bottom: 44px; }
.project-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 18px 20px; cursor: pointer; transition: all 0.18s; position: relative; }
.project-card:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(192,98,47,0.1); transform: translateY(-1px); }
.project-card.active { border-color: var(--accent); background: var(--surface2); box-shadow: 0 4px 20px rgba(192,98,47,0.12); }
.project-card.active .project-name { color: var(--accent); }
.project-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 5px; color: var(--ink); }
.project-meta { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); }
.project-delete { position: absolute; top: 10px; right: 10px; width: 22px; height: 22px; border-radius: 50%; background: transparent; border: none; color: var(--muted2); font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: all 0.15s; }
.project-card:hover .project-delete { opacity: 1; }
.project-delete:hover { background: var(--wrong-bg); color: var(--wrong); }
.add-project-card { background: transparent; border: 1.5px dashed var(--border2); border-radius: 12px; padding: 18px 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--muted); font-weight: 600; font-size: 0.88rem; transition: all 0.18s; }
.add-project-card:hover { border-color: var(--accent); color: var(--accent); background: var(--surface2); }
.divider { height: 1px; background: var(--border); margin: 32px 0; }
.project-panel { display: none; }
.project-panel.visible { display: block; animation: fadeUp 0.22s ease; }

/* ── PANEL TABS ── */
.panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.panel-title { font-size: 1.55rem; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; }
.panel-tabs { display: flex; border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
.panel-tab { font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 9px 22px; cursor: pointer; background: transparent; border: none; color: var(--muted); transition: all 0.15s; border-right: 1px solid var(--border); white-space: nowrap; }
.panel-tab:last-child { border-right: none; }
.panel-tab:hover { color: var(--text); background: var(--bg2); }
.panel-tab.active { background: var(--accent); color: white; }
.tab-pane { display: none; }
.tab-pane.visible { display: block; animation: fadeUp 0.18s ease; }

/* ── BUTTONS ── */
.btn { font-family: 'DM Mono', monospace; font-weight: 500; font-size: 0.75rem; letter-spacing: 0.04em; text-transform: uppercase; padding: 9px 16px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #a8521f; transform: translateY(-1px); }
.btn-green { background: var(--accent2); color: white; }
.btn-green:hover { background: #3a6447; transform: translateY(-1px); }
.btn-blue { background: var(--accent3); color: white; }
.btn-blue:hover { background: #2e4c88; transform: translateY(-1px); }
.btn-outline { background: transparent; color: var(--text); border: 1.5px solid var(--border2); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.btn-ghost { background: transparent; color: var(--muted); border: none; font-size: 0.72rem; padding: 6px 10px; }
.btn-ghost:hover { color: var(--wrong); }

/* ── CARDS TAB ── */
.tab-actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.cards-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
/* Search bar */
.cards-search { width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: 9px; color: var(--ink); font-family: 'Fraunces', serif; font-size: 0.88rem; padding: 8px 13px; outline: none; transition: border-color .15s; margin-bottom: 14px; }
.cards-search:focus { border-color: var(--accent); }
.cards-search::placeholder { color: var(--muted2); font-style: italic; }
/* Drag reorder */
.drag-handle { color: var(--muted2); cursor: grab; font-size: 0.9rem; padding: 0 4px; user-select: none; flex-shrink: 0; }
.drag-handle:active { cursor: grabbing; }
.flashcard-item.dragging { opacity: .4; border-style: dashed; }
.flashcard-item.drag-over { border-color: var(--accent2); box-shadow: 0 0 0 2px var(--accent2); }
.flashcard-item { background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 18px; display: flex; align-items: flex-start; gap: 14px; transition: border-color .15s; }
.flashcard-item:hover { border-color: var(--border2); }
.flashcard-item.editing { border-color: var(--accent); }
.card-q { font-weight: 600; font-size: 0.9rem; margin-bottom: 3px; color: var(--ink); }
.card-a { font-size: 0.82rem; color: var(--muted); font-style: italic; }
.card-edit-btn { color: var(--muted2); cursor: pointer; font-size: 0.78rem; padding: 0 4px; transition: color .15s; flex-shrink: 0; }
.card-edit-btn:hover { color: var(--accent3); }
.card-inline-edit { display: flex; flex-direction: column; gap: 6px; width: 100%; }
.card-inline-input { background: var(--bg2); border: 1.5px solid var(--border); border-radius: 7px; color: var(--ink); font-family: 'Fraunces', serif; font-size: 0.88rem; padding: 6px 10px; outline: none; transition: border-color .15s; resize: none; width: 100%; }
.card-inline-input:focus { border-color: var(--accent); }
.card-edit-actions { display: flex; gap: 6px; justify-content: flex-end; }
/* Question counter in study overlay */
.study-counter { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); margin-top: 10px; }
.card-index { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted2); min-width: 22px; padding-top: 2px; }
.card-content { flex: 1; }
.card-delete { color: var(--muted2); cursor: pointer; font-size: 1rem; transition: color 0.15s; padding: 0 4px; }
.card-delete:hover { color: var(--wrong); }
.add-card-form { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 12px; padding: 20px; display: none; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.add-card-form.visible { display: flex; }
.field-group { display: flex; flex-direction: column; gap: 5px; }
.field-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
input[type="text"], textarea { background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; color: var(--ink); font-family: 'Fraunces', serif; font-size: 0.92rem; padding: 9px 13px; outline: none; transition: border-color 0.15s; resize: none; width: 100%; }
input:focus, textarea:focus { border-color: var(--accent); }
input::placeholder, textarea::placeholder { color: var(--muted2); font-style: italic; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-state .emoji { font-size: 2.2rem; margin-bottom: 10px; }
.empty-state p { font-size: 0.88rem; font-style: italic; }

/* ── QUIZZES TAB ── */
.quizzes-layout { display: grid; grid-template-columns: 260px 1fr; gap: 16px; align-items: start; }
@media(max-width: 680px) { .quizzes-layout { grid-template-columns: 1fr; } }
.quiz-list-panel { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; }
.quiz-list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.quiz-list { display: flex; flex-direction: column; gap: 6px; }
.quiz-list-item { padding: 10px 12px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--bg2); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.quiz-list-item:hover { border-color: var(--accent3); background: #f0f4fd; }
.quiz-list-item.active { border-color: var(--accent3); background: #eef2fc; }
.quiz-list-item.active .qli-name { color: var(--accent3); }
.qli-name { font-weight: 600; font-size: 0.86rem; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.qli-meta { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
.qli-del { color: var(--muted2); cursor: pointer; font-size: 0.8rem; opacity: 0; transition: all 0.15s; flex-shrink: 0; }
.quiz-list-item:hover .qli-del { opacity: 1; }
.qli-del:hover { color: var(--wrong); }

/* Quiz builder */
.quiz-builder { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 20px; }
.builder-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; gap: 12px; flex-wrap: wrap; }
.builder-title-input { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700; background: transparent; border: none; border-bottom: 1.5px solid var(--border); border-radius: 0; padding: 4px 2px; color: var(--ink); outline: none; width: 100%; max-width: 320px; transition: border-color 0.15s; }
.builder-title-input:focus { border-color: var(--accent); }
.builder-title-input::placeholder { color: var(--muted2); font-weight: 400; font-style: italic; }
.builder-actions { display: flex; gap: 8px; flex-shrink: 0; }
.question-cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }

/* Question card */
.q-card { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 12px; padding: 16px 18px; }
.q-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.q-num { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted2); min-width: 22px; }
.q-text-input { flex: 1; background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; color: var(--ink); font-family: 'Fraunces', serif; font-size: 0.9rem; padding: 8px 12px; outline: none; transition: border-color 0.15s; width: 100%; }
.q-text-input:focus { border-color: var(--accent); }
.q-del { color: var(--muted2); cursor: pointer; font-size: 0.85rem; padding: 0 4px; transition: color 0.15s; flex-shrink: 0; }
.q-del:hover { color: var(--wrong); }
.choices-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 10px; }
.choice-row { display: flex; align-items: center; gap: 8px; }
.choice-letter { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); width: 16px; flex-shrink: 0; }
.choice-radio { accent-color: var(--accent2); width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; }
.choice-input { flex: 1; background: var(--surface); border: 1.5px solid var(--border); border-radius: 7px; color: var(--ink); font-family: 'Fraunces', serif; font-size: 0.85rem; padding: 6px 10px; outline: none; transition: border-color 0.15s; }
.choice-input:focus { border-color: var(--accent2); }
.choice-input.correct-choice { border-color: var(--accent2); background: var(--correct-bg); }
.choice-del { color: var(--muted2); cursor: pointer; font-size: 0.78rem; padding: 0 3px; transition: color 0.15s; flex-shrink: 0; }
.choice-del:hover { color: var(--wrong); }
.choice-add-btn { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); background: transparent; border: 1px dashed var(--border2); border-radius: 6px; padding: 4px 10px; cursor: pointer; transition: all 0.15s; margin-top: 2px; align-self: flex-start; }
.choice-add-btn:hover { border-color: var(--accent2); color: var(--accent2); }
.explanation-row { margin-top: 10px; }
.explanation-input { width: 100%; background: var(--surface); border: 1.5px solid var(--border); border-radius: 7px; color: var(--muted); font-family: 'Fraunces', serif; font-size: 0.82rem; font-style: italic; padding: 7px 10px; outline: none; transition: border-color 0.15s; resize: none; }
.explanation-input:focus { border-color: var(--accent); color: var(--ink); }
.add-q-row { display: flex; justify-content: center; }

/* Question type toggle */
.q-type-toggle { display: flex; gap: 6px; margin-bottom: 10px; }
.q-type-btn { font-family: 'DM Mono', monospace; font-size: 0.6rem; text-transform: uppercase; letter-spacing: .06em; padding: 4px 10px; border-radius: 6px; border: 1.5px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; }
.q-type-btn.active { background: var(--accent3); border-color: var(--accent3); color: white; }
/* Text answer input during quiz */
.quiz-text-answer { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; color: var(--ink); font-family: 'Fraunces', serif; font-size: 1rem; padding: 13px 18px; outline: none; transition: border-color .15s; margin-bottom: 4px; }
.quiz-text-answer:focus { border-color: var(--accent3); }
.quiz-text-answer.correct-ans { border-color: var(--correct); background: var(--correct-bg); }
.quiz-text-answer.wrong-ans { border-color: var(--wrong); background: var(--wrong-bg); }
.no-quiz-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--muted); gap: 10px; }
.no-quiz-placeholder .emoji { font-size: 2rem; }
.no-quiz-placeholder p { font-family: 'DM Mono', monospace; font-size: 0.72rem; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(30,26,20,0.5); backdrop-filter: blur(3px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.visible { display: flex; }
.modal { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; padding: 28px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(30,26,20,0.15); }
.modal-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 18px; color: var(--ink); }

/* ── STUDY OVERLAY ── */
.study-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.study-overlay.visible { display: flex; }
.study-top-bar { position: absolute; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid var(--border); background: var(--surface); }
.study-project-name { font-weight: 700; font-size: 0.9rem; color: var(--ink); }
.study-mode-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; }
.study-close { font-family: 'DM Mono', monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; background: transparent; border: 1.5px solid var(--border2); color: var(--muted); border-radius: 6px; padding: 6px 12px; cursor: pointer; }
.study-close:hover { border-color: var(--wrong); color: var(--wrong); }
.progress-wrap { position: absolute; top: 54px; left: 0; right: 0; height: 3px; background: var(--border); }
.progress-fill { height: 100%; background: var(--accent); transition: width 0.35s ease; }

/* Flashcard */
.flip-card-wrap { perspective: 1200px; width: min(540px, 88vw); height: 290px; cursor: pointer; margin-bottom: 28px; margin-top: 16px; }
.flip-card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); }
.flip-card.flipped { transform: rotateY(180deg); }
.flip-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 36px; text-align: center; }
.flip-front { background: var(--surface); border: 1.5px solid var(--border); box-shadow: 0 8px 32px rgba(30,26,20,0.08); }
.flip-back { background: var(--surface2); border: 1.5px solid var(--border2); box-shadow: 0 8px 32px rgba(30,26,20,0.1); transform: rotateY(180deg); }
.flip-back .face-answer { color: var(--accent); }
.face-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 14px; }
.face-text { font-size: 1.2rem; font-weight: 600; line-height: 1.45; color: var(--ink); }
.face-answer { color: var(--accent); }
.flip-hint { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted2); margin-top: 16px; }
.flashcard-nav { display: flex; align-items: center; gap: 16px; }
.nav-counter { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); min-width: 56px; text-align: center; }

/* Quiz take */
.quiz-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 18px; padding: 36px 40px; width: min(580px, 90vw); box-shadow: 0 8px 32px rgba(30,26,20,0.07); margin-top: 16px; margin-bottom: 24px; animation: popIn 0.22s ease; }
.quiz-question { font-size: 1.15rem; font-weight: 600; color: var(--ink); line-height: 1.5; margin-bottom: 28px; }
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-option { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; padding: 13px 18px; cursor: pointer; font-size: 0.92rem; font-family: 'Fraunces', serif; color: var(--ink); text-align: left; transition: all 0.15s; display: flex; align-items: center; gap: 12px; }
.quiz-option:hover:not(:disabled) { border-color: var(--accent3); background: var(--surface2); }
.quiz-option:disabled { cursor: default; }
.quiz-option.correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); font-weight: 600; }
.quiz-option.wrong { background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong); }
.quiz-option.reveal-correct { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); }
.opt-letter { font-family: 'DM Mono', monospace; font-size: 0.65rem; width: 22px; height: 22px; border-radius: 50%; background: var(--border); color: var(--muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.quiz-option.correct .opt-letter, .quiz-option.reveal-correct .opt-letter { background: var(--correct); color: white; }
.quiz-option.wrong .opt-letter { background: var(--wrong); color: white; }
.quiz-feedback { font-family: 'DM Mono', monospace; font-size: 0.75rem; padding: 10px 14px; border-radius: 8px; margin-top: 14px; display: none; }
.quiz-feedback.correct { background: var(--correct-bg); color: var(--correct); display: block; }
.quiz-feedback.wrong { background: var(--wrong-bg); color: var(--wrong); display: block; }
.quiz-explanation { font-size: 0.82rem; font-family: 'Fraunces', serif; font-style: italic; color: var(--muted); background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-top: 10px; display: none; }
.quiz-explanation.show { display: block; }
.quiz-next { margin-top: 16px; width: 100%; display: none; }
.quiz-next.visible { display: block; }

/* Done */
.done-screen { text-align: center; max-width: 400px; }
.done-emoji { font-size: 3.5rem; margin-bottom: 16px; }
.done-title { font-size: 2rem; font-weight: 700; color: var(--ink); margin-bottom: 8px; letter-spacing: -0.02em; }
.done-sub { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); margin-bottom: 8px; }
.score-display { font-size: 3rem; font-weight: 700; color: var(--accent); margin: 16px 0; letter-spacing: -0.02em; }
.score-label { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted2); margin-bottom: 24px; }
.done-btns { display: flex; gap: 10px; justify-content: center; }

@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes popIn { from { opacity:0; transform:scale(0.94); } to { opacity:1; transform:scale(1); } }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <div class="logo">flash<em>deck</em></div>
      <div class="logo-sub">// study smarter</div>
    </div>
    <div class="header-right">
      <span class="import-success" id="importSuccess">✓ Imported!</span>
      <button class="btn-sm" onclick="toggleDark()">◐</button>
      <button class="btn-sm" onclick="importProjects()">↑ Import</button>
      <button class="btn-sm" onclick="exportProjects()">↓ Export</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
    </div>
  </header>

  <div class="section-label">Projects</div>
  <div class="projects-grid" id="projectsGrid"></div>

  <div class="project-panel" id="projectPanel">
    <div class="divider"></div>
    <div class="panel-header">
      <div class="panel-title" id="panelTitle"></div>
    </div>
    <div class="panel-tabs">
      <button class="panel-tab active" onclick="switchPanelTab('cards',this)">Cards</button>
      <button class="panel-tab" onclick="switchPanelTab('quizzes',this)">Quizzes</button>
    </div>

    <!-- CARDS TAB -->
    <div class="tab-pane visible" id="tab-cards">
      <div class="tab-actions">
        <button class="btn btn-outline" onclick="toggleAddForm()">+ Add Card</button>
        <button class="btn btn-green" onclick="startFlashcards()">▶ Flashcards</button>
      </div>
      <div class="add-card-form" id="addCardForm">
        <div class="field-group">
          <div class="field-label">Question</div>
          <input type="text" id="inputQuestion" placeholder="e.g. What does a yellow light mean?" />
        </div>
        <div class="field-group">
          <div class="field-label">Answer</div>
          <textarea id="inputAnswer" rows="2" placeholder="e.g. Slow down, prepare to stop."></textarea>
        </div>
        <div class="form-actions">
          <button class="btn btn-ghost" onclick="toggleAddForm()">Cancel</button>
          <button class="btn btn-primary" onclick="addCard()">Add Card</button>
        </div>
      </div>
      <input class="cards-search" id="cardsSearch" type="text" placeholder="Search cards..." oninput="renderCards()" style="display:none">
      <div class="cards-list" id="cardsList"></div>
    </div>

    <!-- QUIZZES TAB -->
    <div class="tab-pane" id="tab-quizzes">
      <div class="quizzes-layout">
        <div class="quiz-list-panel">
          <div class="quiz-list-header">
            <div class="section-label" style="margin:0">Quizzes</div>
            <div style="display:flex;gap:6px">
              <button class="btn-sm" onclick="autoGenerateQuiz()" title="Generate quiz from your flashcards">⚡ Auto</button>
              <button class="btn-sm" onclick="newQuiz()">+ New</button>
            </div>
          </div>
          <div class="quiz-list" id="quizList"></div>
        </div>
        <div id="quizBuilderArea">
          <div class="no-quiz-placeholder">
            <div class="emoji">📝</div>
            <p>Select a quiz or create a new one</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- New Project Modal -->
<div class="modal-overlay" id="newProjectModal">
  <div class="modal">
    <div class="modal-title">New Project</div>
    <div class="field-group" style="margin-bottom:18px">
      <div class="field-label">Project Name</div>
      <input type="text" id="newProjectName" placeholder="e.g. Biology Ch. 4, Spanish Vocab..." />
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeNewProjectModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createProject()">Create</button>
    </div>
  </div>
</div>

<!-- Study Overlay -->
<div class="study-overlay" id="studyOverlay">
  <div class="study-top-bar">
    <div>
      <div class="study-project-name" id="studyProjectName"></div>
      <div class="study-mode-label" id="studyModeLabel"></div>
    </div>
    <button class="study-close" onclick="endStudy()">Exit</button>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>

  <!-- Flashcard mode -->
  <div id="flashcardMode" style="display:none;flex-direction:column;align-items:center">
    <div class="flip-card-wrap" onclick="flipCard()">
      <div class="flip-card" id="flipCard">
        <div class="flip-face flip-front">
          <div class="face-label">Question</div>
          <div class="face-text" id="fcQuestion"></div>
          <div class="flip-hint">tap to reveal answer</div>
        </div>
        <div class="flip-face flip-back">
          <div class="face-label">Answer</div>
          <div class="face-text face-answer" id="fcAnswer"></div>
        </div>
      </div>
    </div>
    <div class="flashcard-nav">
      <button class="btn btn-outline" onclick="fcPrev()">Prev</button>
      <div class="nav-counter" id="fcCounter"></div>
      <button class="btn btn-primary" onclick="fcNext()">Next</button>
    </div>
  </div>

  <!-- Quiz take mode -->
  <div id="quizMode" style="display:none;flex-direction:column;align-items:center">
    <div class="quiz-card">
      <div class="study-counter" id="quizCounter"></div>
      <div class="quiz-question" id="quizQuestion"></div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <div class="quiz-explanation" id="quizExplanation"></div>
      <button class="btn btn-primary quiz-next" id="quizNext" onclick="nextQuizQuestion()">Next Question</button>
    </div>
  </div>

  <!-- Done screen -->
  <div id="doneScreen" style="display:none">
    <div class="done-screen">
      <div class="done-emoji" id="doneEmoji"></div>
      <div class="done-title" id="doneTitle"></div>
      <div class="score-display" id="scoreDisplay"></div>
      <div class="score-label" id="scoreLabel"></div>
      <div class="done-sub" id="doneSub"></div>
      <div class="done-btns" id="doneBtns"></div>
    </div>
  </div>
</div>

<script>
// ── DARK MODE ─────────────────────────────────────────
function toggleDark(){
  const d = document.documentElement;
  d.hasAttribute('data-dark') ? d.removeAttribute('data-dark') : d.setAttribute('data-dark','');
  localStorage.setItem('dibinDark', d.hasAttribute('data-dark') ? '1' : '0');
}
// Default dark — only go light if user explicitly set it to 0
if(localStorage.getItem('dibinDark') !== '0') document.documentElement.setAttribute('data-dark','');

// ── STATE ────────────────────────────────────────────
// projects: [{ id, name, cards: [{q,a}], quizzes: [{id, name, questions: [{q, choices:[{text,correct}], explanation}]}] }]
let projects = JSON.parse(localStorage.getItem('fdProjects') || '[]');
let activeId = null;
let activeQuizId = null; // currently open quiz in builder

function save() { localStorage.setItem('fdProjects', JSON.stringify(projects)); }
function proj(id) { return projects.find(p => p.id === (id || activeId)); }

// Migrate old projects that don't have quizzes array, and questions without type
projects.forEach(p => {
  if (!p.quizzes) p.quizzes = [];
  p.quizzes.forEach(q => {
    q.questions.forEach(qu => {
      if (!qu.type) qu.type = 'mc';
      if (!qu.choices) qu.choices = [];
    });
  });
});

// ── PANEL TABS ───────────────────────────────────────
function switchPanelTab(name, btn) {
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('visible'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('visible');
}

// ── PROJECTS ─────────────────────────────────────────
function renderProjects() {
  const g = document.getElementById('projectsGrid');
  g.innerHTML = `<div class="add-project-card" onclick="openNewProjectModal()"><span style="font-size:1.3rem">+</span><span>New Project</span></div>`;
  projects.forEach(p => {
    const d = document.createElement('div');
    d.className = 'project-card' + (p.id === activeId ? ' active' : '');
    const qCount = (p.quizzes||[]).length;
    d.innerHTML = `
      <button class="project-delete" onclick="deleteProject(event,'${p.id}')" title="Delete">✕</button>
      <div class="project-name">${esc(p.name)}</div>
      <div class="project-meta">${p.cards.length} card${p.cards.length!==1?'s':''} · ${qCount} quiz${qCount!==1?'zes':''}</div>`;
    d.onclick = () => openProject(p.id);
    g.appendChild(d);
  });
}

function openProject(id) {
  activeId = id;
  activeQuizId = null;
  document.getElementById('panelTitle').textContent = proj().name;
  document.getElementById('projectPanel').classList.add('visible');
  document.getElementById('addCardForm').classList.remove('visible');
  const s = document.getElementById('cardsSearch');
  if (s) s.value = '';
  renderCards(); renderProjects(); renderQuizList();
  renderQuizBuilder();
}

// ── CARDS ─────────────────────────────────────────────
function renderCards() {
  const p = proj();
  const list = document.getElementById('cardsList');
  const searchEl = document.getElementById('cardsSearch');

  // Show/hide search bar
  if (searchEl) searchEl.style.display = p.cards.length > 4 ? 'block' : 'none';

  if (!p.cards.length) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">📭</div><p>No cards yet.</p></div>`;
    return;
  }

  const query = (searchEl ? searchEl.value : '').toLowerCase().trim();
  const cards = p.cards.map((c,i) => ({...c, realIdx: i}));
  const filtered = query ? cards.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().includes(query)) : cards;

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">🔍</div><p>No cards match "${query}"</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(c => `
    <div class="flashcard-item" id="carditem-${c.realIdx}" draggable="${!query}" data-idx="${c.realIdx}"
      ondragstart="dragCardStart(event,${c.realIdx})"
      ondragover="dragCardOver(event)"
      ondrop="dragCardDrop(event,${c.realIdx})"
      ondragend="dragCardEnd()"
      ondragleave="dragCardLeave(event)">
      ${!query ? `<span class="drag-handle" title="Drag to reorder">⠿</span>` : ''}
      <div class="card-index">${String(c.realIdx+1).padStart(2,'0')}</div>
      <div class="card-content" id="cardcontent-${c.realIdx}">
        <div class="card-q">${esc(c.q)}</div>
        <div class="card-a">${esc(c.a)}</div>
      </div>
      <span class="card-edit-btn" onclick="editCard(${c.realIdx})" title="Edit">✎</span>
      <span class="card-delete" onclick="deleteCard(${c.realIdx})">✕</span>
    </div>`).join('');
}

// ── DRAG REORDER ──────────────────────────────────────
let dragSrcIdx = null;

function dragCardStart(e, idx) {
  dragSrcIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => document.querySelector(`[data-idx="${idx}"]`)?.classList.add('dragging'), 0);
}

function dragCardOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function dragCardLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function dragCardDrop(e, targetIdx) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
  const cards = proj().cards;
  const [moved] = cards.splice(dragSrcIdx, 1);
  cards.splice(targetIdx, 0, moved);
  save(); renderCards(); renderProjects();
}

function dragCardEnd() {
  dragSrcIdx = null;
  document.querySelectorAll('.flashcard-item').forEach(el => {
    el.classList.remove('dragging','drag-over');
  });
}

function editCard(i) {
  const c = proj().cards[i];
  const content = document.getElementById('cardcontent-'+i);
  const item = document.getElementById('carditem-'+i);
  item.classList.add('editing');
  content.innerHTML = `
    <div class="card-inline-edit">
      <textarea class="card-inline-input" rows="2" id="eq-${i}">${esc(c.q)}</textarea>
      <textarea class="card-inline-input" rows="2" id="ea-${i}">${esc(c.a)}</textarea>
      <div class="card-edit-actions">
        <button class="btn btn-ghost" style="font-size:.65rem;padding:4px 8px" onclick="cancelEditCard(${i})">Cancel</button>
        <button class="btn btn-primary" style="font-size:.65rem;padding:4px 10px" onclick="saveEditCard(${i})">Save</button>
      </div>
    </div>`;
  document.getElementById('eq-'+i).focus();
}

function cancelEditCard(i) { renderCards(); }

function saveEditCard(i) {
  const q = document.getElementById('eq-'+i).value.trim();
  const a = document.getElementById('ea-'+i).value.trim();
  if (!q || !a) return;
  proj().cards[i] = {q, a}; save(); renderCards(); renderProjects();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleAddForm() {
  const f = document.getElementById('addCardForm');
  f.classList.toggle('visible');
  if (f.classList.contains('visible')) document.getElementById('inputQuestion').focus();
}

function addCard() {
  const q = document.getElementById('inputQuestion').value.trim();
  const a = document.getElementById('inputAnswer').value.trim();
  if (!q || !a) return;
  proj().cards.push({q, a}); save();
  document.getElementById('inputQuestion').value = '';
  document.getElementById('inputAnswer').value = '';
  document.getElementById('inputQuestion').focus();
  renderCards(); renderProjects();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('addCardForm').classList.contains('visible') && document.activeElement === document.getElementById('inputAnswer')) addCard();
});

function deleteCard(i) { proj().cards.splice(i,1); save(); renderCards(); renderProjects(); }

function deleteProject(e, id) {
  e.stopPropagation();
  const p = proj(id);
  if (!confirm(`Delete "${p.name}"? This can't be undone.`)) return;
  projects = projects.filter(p => p.id !== id); save();
  if (activeId === id) { activeId = null; document.getElementById('projectPanel').classList.remove('visible'); }
  renderProjects();
}

function openNewProjectModal() { document.getElementById('newProjectModal').classList.add('visible'); setTimeout(()=>document.getElementById('newProjectName').focus(),50); }
function closeNewProjectModal() { document.getElementById('newProjectModal').classList.remove('visible'); document.getElementById('newProjectName').value=''; }
function createProject() {
  const name = document.getElementById('newProjectName').value.trim(); if (!name) return;
  const p = {id: Date.now().toString(), name, cards: [], quizzes: []};
  projects.push(p); save(); closeNewProjectModal(); renderProjects(); openProject(p.id);
}
document.getElementById('newProjectName').addEventListener('keydown', e => { if(e.key==='Enter') createProject(); });
document.getElementById('newProjectModal').addEventListener('click', e => { if(e.target===document.getElementById('newProjectModal')) closeNewProjectModal(); });

// ── QUIZ BUILDER ──────────────────────────────────────
function getQuiz(qid) { return (proj().quizzes||[]).find(q => q.id === (qid||activeQuizId)); }

function renderQuizList() {
  const list = document.getElementById('quizList');
  const quizzes = proj().quizzes || [];
  if (!quizzes.length) {
    list.innerHTML = `<div style="font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted2);padding:10px 4px">No quizzes yet</div>`;
    return;
  }
  list.innerHTML = quizzes.map(q => `
    <div class="quiz-list-item${q.id===activeQuizId?' active':''}" onclick="openQuiz('${q.id}')">
      <div>
        <div class="qli-name">${esc(q.name||'Untitled Quiz')}</div>
        <div class="qli-meta">${q.questions.length} question${q.questions.length!==1?'s':''}</div>
      </div>
      <span class="qli-del" onclick="deleteQuiz(event,'${q.id}')">✕</span>
    </div>`).join('');
}

function newQuiz() {
  const p = proj();
  const q = { id: Date.now().toString(), name: '', questions: [] };
  p.quizzes.push(q); save();
  activeQuizId = q.id;
  renderQuizList();
  renderQuizBuilder();
}

function openQuiz(qid) {
  activeQuizId = qid;
  renderQuizList();
  renderQuizBuilder();
}

function deleteQuiz(e, qid) {
  e.stopPropagation();
  const q = getQuiz(qid);
  if (!confirm(`Delete "${q.name||'Untitled Quiz'}"?`)) return;
  proj().quizzes = proj().quizzes.filter(q => q.id !== qid); save();
  if (activeQuizId === qid) { activeQuizId = null; }
  renderQuizList(); renderQuizBuilder();
}

function canTakeQuiz(q) {
  return q.questions.length > 0 && q.questions.every(qu => {
    if (!qu.q.trim()) return false;
    if ((qu.type||'mc') === 'text') return qu.choices.length > 0 && qu.choices[0].text.trim();
    return qu.choices.some(c=>c.correct) && qu.choices.filter(c=>c.text.trim()).length >= 2;
  });
}

function renderQuizBuilder() {
  const area = document.getElementById('quizBuilderArea');
  const q = activeQuizId ? getQuiz() : null;
  if (!q) {
    area.innerHTML = `<div class="no-quiz-placeholder"><div class="emoji">📝</div><p>Select a quiz or create a new one</p></div>`;
    return;
  }
  const canTake = canTakeQuiz(q);
  area.innerHTML = `
    <div class="quiz-builder">
      <div class="builder-top">
        <input class="builder-title-input" type="text" placeholder="Quiz name..." value="${esc(q.name)}"
          oninput="updateQuizName(this.value)">
        <div class="builder-actions">
          ${canTake ? `<button class="btn btn-blue" onclick="takeQuiz('${q.id}')">▶ Take Quiz</button>` : ''}
        </div>
      </div>
      <div class="question-cards" id="questionCards">
        ${q.questions.map((qu,qi) => renderQuestionCard(qu,qi)).join('')}
      </div>
      <div class="add-q-row">
        <button class="btn btn-outline" onclick="addQuestion()">+ Add Question</button>
      </div>
    </div>`;
}

function renderQuestionCard(qu, qi) {
  const letters = ['A','B','C','D','E'];
  const type = qu.type || 'mc';
  const choicesHTML = type === 'text'
    ? `<div class="choice-row" id="choicerow-${qi}-0">
        <span class="choice-letter" style="color:var(--accent2)">✓</span>
        <input class="choice-input correct-choice" type="text"
          placeholder="Correct answer (exact match)..." value="${esc(qu.choices[0]?.text||'')}"
          oninput="updateTextAnswer(${qi},this.value)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();}">
       </div>`
    : qu.choices.map((c,ci) => `
        <div class="choice-row" id="choicerow-${qi}-${ci}">
          <span class="choice-letter">${letters[ci]}</span>
          <input type="radio" class="choice-radio" name="correct-${qi}" ${c.correct?'checked':''}
            onchange="setCorrect(${qi},${ci})">
          <input class="choice-input${c.correct?' correct-choice':''}" type="text"
            placeholder="Answer choice..." value="${esc(c.text)}"
            oninput="updateChoice(${qi},${ci},this.value)"
            onkeydown="choiceKeydown(event,${qi},${ci})">
          ${qu.choices.length > 1 ? `<span class="choice-del" onclick="deleteChoice(${qi},${ci})">✕</span>` : ''}
        </div>`).join('');

  return `
    <div class="q-card" id="qcard-${qi}">
      <div class="q-card-header">
        <div class="q-num">Q${qi+1}</div>
        <input class="q-text-input" type="text" placeholder="Question text..." value="${esc(qu.q)}"
          oninput="updateQuestion(${qi},'q',this.value)">
        <span class="q-del" onclick="deleteQuestion(${qi})">✕</span>
      </div>
      <div class="q-type-toggle">
        <button class="q-type-btn${type==='mc'?' active':''}" onclick="setQuestionType(${qi},'mc')">Multiple Choice</button>
        <button class="q-type-btn${type==='text'?' active':''}" onclick="setQuestionType(${qi},'text')">Text Input</button>
      </div>
      <div class="choices-list" id="choices-${qi}">
        ${choicesHTML}
      </div>
      ${type==='mc' && qu.choices.length < 5 ? `<button class="choice-add-btn" onclick="addChoice(${qi})">+ add choice</button>` : ''}
      <div class="explanation-row">
        <textarea class="explanation-input" rows="1" placeholder="Explanation (optional) — shown after answering..."
          oninput="updateQuestion(${qi},'explanation',this.value);this.style.height='auto';this.style.height=this.scrollHeight+'px'"
          style="overflow:hidden">${esc(qu.explanation||'')}</textarea>
      </div>
    </div>`;
}

function updateQuizName(val) {
  getQuiz().name = val; save(); renderQuizList();
}

function addQuestion() {
  getQuiz().questions.push({ q: '', type: 'mc', choices: [{text:'',correct:false}], explanation: '' });
  save(); renderQuizBuilder();
  setTimeout(() => {
    const inputs = document.querySelectorAll('.q-text-input');
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

function deleteQuestion(qi) {
  getQuiz().questions.splice(qi, 1); save(); renderQuizBuilder();
}

function updateQuestion(qi, field, val) {
  getQuiz().questions[qi][field] = val; save();
  const q = getQuiz();
  const btn = document.querySelector('.builder-actions');
  if (btn) btn.innerHTML = canTakeQuiz(q) ? `<button class="btn btn-blue" onclick="takeQuiz('${q.id}')">▶ Take Quiz</button>` : '';
}

function choiceKeydown(e, qi, ci) {
  const qu = getQuiz().questions[qi];
  if (e.key === 'Enter') {
    e.preventDefault();
    if (qu.choices.length < 5) {
      // Add new choice then focus it
      qu.choices.push({text:'',correct:false}); save(); renderQuizBuilder();
      setTimeout(() => {
        const newInput = document.querySelector(`#choicerow-${qi}-${qu.choices.length-1} .choice-input`);
        if (newInput) newInput.focus();
      }, 30);
    }
    return;
  }
  if (e.key === 'Tab' && !e.shiftKey) {
    // Tab to next choice, or to explanation if last
    const nextRow = document.querySelector(`#choicerow-${qi}-${ci+1} .choice-input`);
    if (nextRow) {
      e.preventDefault();
      nextRow.focus();
    }
    // else let natural tab flow to explanation
  }
}

function setQuestionType(qi, type) {
  const qu = getQuiz().questions[qi];
  qu.type = type;
  if (type === 'text') {
    // Keep first choice as the answer, clear the rest
    const ans = qu.choices.find(c=>c.correct) || qu.choices[0];
    qu.choices = [{ text: ans ? ans.text : '', correct: true }];
  } else {
    // Switch back to MC — start with 1 blank choice
    if (!qu.choices.length || (qu.choices.length === 1 && qu.choices[0].correct)) {
      qu.choices = [{ text: qu.choices[0]?.text||'', correct: true }, { text: '', correct: false }];
    }
  }
  save(); renderQuizBuilder();
}

function updateTextAnswer(qi, val) {
  const qu = getQuiz().questions[qi];
  qu.choices = [{ text: val, correct: true }];
  save();
  updateQuestion(qi, 'q', qu.q);
}

function addChoice(qi) {
  const qu = getQuiz().questions[qi];
  if (qu.choices.length >= 5) return;
  qu.choices.push({text:'',correct:false}); save(); renderQuizBuilder();
}

function deleteChoice(qi, ci) {
  const qu = getQuiz().questions[qi];
  if (qu.choices.length <= 1) return;
  const wasCorrect = qu.choices[ci].correct;
  qu.choices.splice(ci, 1);
  if (wasCorrect && qu.choices.length) qu.choices[0].correct = true;
  save(); renderQuizBuilder();
}

function updateChoice(qi, ci, val) {
  getQuiz().questions[qi].choices[ci].text = val; save();
  updateQuestion(qi, 'q', getQuiz().questions[qi].q); // trigger canTake re-check
}

function setCorrect(qi, ci) {
  const qu = getQuiz().questions[qi];
  qu.choices.forEach((c,i) => c.correct = i === ci);
  save();
  // Update choice input styling without full re-render
  const letters = ['A','B','C','D','E'];
  qu.choices.forEach((c,i) => {
    const inp = document.querySelector(`#choicerow-${qi}-${i} .choice-input`);
    if (inp) inp.className = 'choice-input' + (c.correct ? ' correct-choice' : '');
  });
  updateQuestion(qi, 'q', qu.q);
}

// ── TAKE QUIZ ─────────────────────────────────────────
let takeQuizData = null; // { questions, idx, score, quizId }

function takeQuiz(qid) {
  const q = getQuiz(qid);
  if (!q) return;
  let questions = [...q.questions];
  // Shuffle
  questions = questions.sort(() => Math.random() - 0.5);

  takeQuizData = { questions, idx: 0, score: 0, quizId: qid };
  document.getElementById('studyProjectName').textContent = proj().name;
  document.getElementById('studyModeLabel').textContent = q.name || 'Custom Quiz';
  document.getElementById('studyOverlay').classList.add('visible');
  document.getElementById('flashcardMode').style.display = 'none';
  document.getElementById('quizMode').style.display = 'flex';
  document.getElementById('doneScreen').style.display = 'none';
  setP(0);
  showTakeQ();
}

function autoGenerateQuiz() {
  const p = proj();
  if (p.cards.length < 4) { alert('You need at least 4 cards to auto-generate a quiz — it needs enough cards to make wrong answer choices.'); return; }
  const name = `Auto Quiz — ${p.name}`;
  const questions = p.cards.map(card => {
    // Wrong choices: other cards' answers, shuffled, take up to 3
    const others = p.cards.filter(c => c !== card).sort(() => Math.random() - 0.5).slice(0, 3);
    const choices = [
      { text: card.a, correct: true },
      ...others.map(o => ({ text: o.a, correct: false }))
    ].sort(() => Math.random() - 0.5);
    return { q: card.q, choices, explanation: '' };
  });
  const q = { id: Date.now().toString(), name, questions };
  p.quizzes.push(q); save();
  activeQuizId = q.id;
  renderQuizList(); renderQuizBuilder();
  // Switch to quizzes tab
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('visible'));
  document.querySelector('.panel-tab:nth-child(2)').classList.add('active');
  document.getElementById('tab-quizzes').classList.add('visible');
}

function showTakeQ() {
  const { questions, idx } = takeQuizData;
  const qu = questions[idx];
  const type = qu.type || 'mc';
  setP((idx / questions.length) * 100);
  document.getElementById('quizCounter').textContent = `Question ${idx+1} of ${questions.length}`;
  document.getElementById('quizQuestion').textContent = qu.q;
  document.getElementById('quizFeedback').className = 'quiz-feedback';
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('quizExplanation').className = 'quiz-explanation';
  document.getElementById('quizExplanation').textContent = '';
  document.getElementById('quizNext').classList.remove('visible');

  const letters = ['A','B','C','D','E'];

  if (type === 'text') {
    document.getElementById('quizOptions').innerHTML = `
      <input class="quiz-text-answer" id="textAnswerInput" type="text"
        placeholder="Type your answer..." autocomplete="off"
        onkeydown="if(event.key==='Enter')submitTextAnswer()">
      <button class="btn btn-outline" style="margin-top:8px;width:100%" onclick="submitTextAnswer()">Submit</button>`;
    setTimeout(() => document.getElementById('textAnswerInput')?.focus(), 50);
  } else {
    const shuffled = [...qu.choices].sort(() => Math.random() - 0.5);
    document.getElementById('quizOptions').innerHTML = shuffled.map((c,i) => `
      <button class="quiz-option" onclick="answerTakeQ(this, ${c.correct})">
        <span class="opt-letter">${letters[i]}</span>
        <span>${esc(c.text)}</span>
      </button>`).join('');
  }
}

function submitTextAnswer() {
  const input = document.getElementById('textAnswerInput');
  if (!input || input.disabled) return;
  const { questions, idx } = takeQuizData;
  const qu = questions[idx];
  const correct = qu.choices[0].text.trim().toLowerCase();
  const given = input.value.trim().toLowerCase();
  const isCorrect = given === correct;
  input.disabled = true;
  input.className = 'quiz-text-answer ' + (isCorrect ? 'correct-ans' : 'wrong-ans');
  document.querySelector('#quizOptions .btn-outline').disabled = true;

  if (isCorrect) {
    takeQuizData.score++;
    document.getElementById('quizFeedback').textContent = '✓ Correct!';
    document.getElementById('quizFeedback').className = 'quiz-feedback correct';
  } else {
    document.getElementById('quizFeedback').textContent = `✗ Correct answer: "${qu.choices[0].text}"`;
    document.getElementById('quizFeedback').className = 'quiz-feedback wrong';
  }

  const explanation = qu.explanation;
  if (explanation && explanation.trim()) {
    document.getElementById('quizExplanation').textContent = '💡 ' + explanation;
    document.getElementById('quizExplanation').className = 'quiz-explanation show';
  }

  const isLast = idx >= questions.length - 1;
  document.getElementById('quizNext').textContent = isLast ? 'See Results' : 'Next Question';
  document.getElementById('quizNext').classList.add('visible');
}

function answerTakeQ(btn, isCorrect) {
  const { questions, idx } = takeQuizData;
  document.querySelectorAll('.quiz-option').forEach(o => o.disabled = true);

  if (isCorrect) {
    btn.classList.add('correct');
    takeQuizData.score++;
    document.getElementById('quizFeedback').textContent = '✓ Correct!';
    document.getElementById('quizFeedback').className = 'quiz-feedback correct';
  } else {
    btn.classList.add('wrong');
    document.getElementById('quizFeedback').textContent = '✗ Wrong!';
    document.getElementById('quizFeedback').className = 'quiz-feedback wrong';
    document.querySelectorAll('.quiz-option').forEach(o => {
      if (o.getAttribute('onclick') && o.getAttribute('onclick').includes('true')) {
        o.classList.add('reveal-correct');
      }
    });
  }

  const explanation = questions[idx].explanation;
  if (explanation && explanation.trim()) {
    document.getElementById('quizExplanation').textContent = '💡 ' + explanation;
    document.getElementById('quizExplanation').className = 'quiz-explanation show';
  }

  const isLast = idx >= questions.length - 1;
  document.getElementById('quizNext').textContent = isLast ? 'See Results' : 'Next Question';
  document.getElementById('quizNext').classList.add('visible');
}

function nextQuizQuestion() {
  const td = takeQuizData;
  if (td.idx < td.questions.length - 1) {
    td.idx++;
    showTakeQ();
  } else {
    document.getElementById('quizMode').style.display = 'none';
    showDone('customquiz', td.score, td.questions.length, td.quizId);
  }
}

// ── FLASHCARDS ────────────────────────────────────────
let studyCards = [], studyIdx = 0;

function startFlashcards() {
  if (!proj().cards.length) return;
  studyCards = [...proj().cards].sort(() => Math.random() - 0.5);
  studyIdx = 0;
  document.getElementById('studyProjectName').textContent = proj().name;
  document.getElementById('studyModeLabel').textContent = 'Flashcard Mode';
  document.getElementById('studyOverlay').classList.add('visible');
  document.getElementById('flashcardMode').style.display = 'flex';
  document.getElementById('quizMode').style.display = 'none';
  document.getElementById('doneScreen').style.display = 'none';
  setP(0); showFC();
}

function showFC() {
  const c = studyCards[studyIdx];
  document.getElementById('flipCard').classList.remove('flipped');
  document.getElementById('fcQuestion').textContent = c.q;
  document.getElementById('fcAnswer').textContent = c.a;
  document.getElementById('fcCounter').textContent = `${studyIdx+1} / ${studyCards.length}`;
  setP((studyIdx / studyCards.length) * 100);
}
function flipCard() { document.getElementById('flipCard').classList.toggle('flipped'); }
function fcNext() {
  if (studyIdx < studyCards.length - 1) { studyIdx++; showFC(); }
  else { document.getElementById('flashcardMode').style.display = 'none'; showDone('flash', studyCards.length, studyCards.length, null); }
}
function fcPrev() { if (studyIdx > 0) { studyIdx--; showFC(); } }

function endStudy() { document.getElementById('studyOverlay').classList.remove('visible'); }
function setP(pct) { document.getElementById('progressFill').style.width = pct + '%'; }

// ── DONE SCREEN ───────────────────────────────────────
function showDone(mode, score, total, quizId) {
  setP(100);
  const pct = Math.round((score / total) * 100);
  let emoji, title;
  if (mode === 'flash') { emoji = '🎉'; title = 'All Done!'; }
  else if (pct === 100) { emoji = '🏆'; title = 'Perfect Score!'; }
  else if (pct >= 80) { emoji = '🎉'; title = 'Great Job!'; }
  else if (pct >= 60) { emoji = '👍'; title = 'Good Effort!'; }
  else { emoji = '📚'; title = 'Keep Studying!'; }

  document.getElementById('doneEmoji').textContent = emoji;
  document.getElementById('doneTitle').textContent = title;
  document.getElementById('doneSub').textContent = mode === 'flash' ? `Reviewed all ${total} cards.` : `${score} correct out of ${total}.`;

  if (mode !== 'flash') {
    document.getElementById('scoreDisplay').textContent = pct + '%';
    document.getElementById('scoreDisplay').style.display = '';
    document.getElementById('scoreLabel').textContent = `${score} / ${total} correct`;
    document.getElementById('scoreLabel').style.display = '';
  } else {
    document.getElementById('scoreDisplay').style.display = 'none';
    document.getElementById('scoreLabel').style.display = 'none';
  }

  document.getElementById('doneBtns').innerHTML = mode === 'flash'
    ? `<button class="btn btn-outline" onclick="startFlashcards()">Study Again</button><button class="btn btn-primary" onclick="endStudy()">Back to Deck</button>`
    : `<button class="btn btn-outline" onclick="takeQuiz('${quizId}')">Retry Quiz</button><button class="btn btn-primary" onclick="endStudy()">Back to Deck</button>`;

  document.getElementById('doneScreen').style.display = 'block';
}

// ── KEYBOARD SHORTCUTS ────────────────────────────────
document.addEventListener('keydown', e => {
  if (!document.getElementById('studyOverlay').classList.contains('visible')) return;
  if (document.getElementById('flashcardMode').style.display !== 'none') {
    if (e.key === 'ArrowRight') fcNext();
    if (e.key === 'ArrowLeft') fcPrev();
    if (e.key === ' ') { e.preventDefault(); flipCard(); }
  }
  if (e.key === 'Escape') endStudy();
});

// ── EXPORT / IMPORT ───────────────────────────────────
function exportProjects() {
  if (!projects.length) { alert('No projects to export yet!'); return; }
  const blob = new Blob([JSON.stringify(projects, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'flashdeck-backup.json'; a.click();
  URL.revokeObjectURL(url);
}
function importProjects() { document.getElementById('importFile').value=''; document.getElementById('importFile').click(); }
function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) throw new Error();
      let added = 0;
      imported.forEach(p => {
        if (!p.id || !p.name || !Array.isArray(p.cards)) return;
        if (!p.quizzes) p.quizzes = [];
        if (!projects.find(e => e.id === p.id)) { projects.push(p); added++; }
      });
      save(); renderProjects();
      const msg = document.getElementById('importSuccess');
      msg.textContent = `✓ ${added} project${added!==1?'s':''} imported!`;
      msg.classList.add('show'); setTimeout(()=>msg.classList.remove('show'), 3000);
    } catch { alert("Invalid file."); }
  };
  reader.readAsText(file);
}

// ── INIT ──────────────────────────────────────────────
renderProjects();
</script>
